apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalkulator-deployment
  labels:
    app: kalkulator
spec:
  replicas: 4
  selector:
    matchLabels:
      app: kalkulator
  template:
    metadata:
      labels:
        app: kalkulator
    spec:
      containers:
      - name: kalkulator-container
        image: doretor/kalkulator:latest
        ports:
        - containerPort: 3000
        command: ["node", "server.js"]
---
apiVersion: v1
kind: Service
metadata:
  name: kalkulator-service
spec:
  selector:
    app: kalkulator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
