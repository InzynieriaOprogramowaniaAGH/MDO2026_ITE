# Główny działający program (90% ruchu)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-main
spec:
  replicas: 4
  selector:
    matchLabels:
      app: canary-app
  template:
    metadata:
      labels:
        app: canary-app
        version: v1
    spec:
      containers:
      - name: app
        image: scornax/my-web-app:v1-fixed
---
# Nowa, testowa wersja (10% ruchu)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canary-app
  template:
    metadata:
      labels:
        app: canary-app
        version: v2
    spec:
      containers:
      - name: app
        image: scornax/my-web-app:v2
---
# Serwis kierujący ruch do obu (bo oba mają app: canary-app)
apiVersion: v1
kind: Service
metadata:
  name: canary-service
spec:
  type: NodePort
  selector:
    app: canary-app
  ports:
    - port: 80
      targetPort: 80
