---
- name: Wdrożenie artefaktu 
  hosts: Endpoints
  become: yes

  tasks:
    - name: 1. Sanity check 
      command: df -h /
      register: df_output
      failed_when: false 

    - name: Wyświetl wynik sanity check
      debug:
        msg: "Dysk sprawdzony: {{ df_output.stdout_lines[1] }}"

    - name: 2. Instalacja silnika Docker na maszynie docelowej
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Upewnienie się, że Docker działa
      service:
        name: docker
        state: started
        enabled: yes

    - name: 3. Wysłanie pliku aplikacji (.tar.gz) na zdalną maszynę
      copy:
        src: my-app.tar.gz
        dest: /opt/my-app.tar.gz

    - name: 4. Uruchomienie kontenera weryfikującego (Alpine), udostępniającego plik
      command: >
        docker run --rm -v /opt/my-app.tar.gz:/app.tar.gz alpine
        sh -c 'echo "Smoke Test: Plik dostarczony!" && ls -la /app.tar.gz'
      register: container_test

    - name: 5. Weryfikacja poprawnego uruchomienia kontenera
      debug:
        msg: "Wynik testu w kontenerze: {{ container_test.stdout }}"

    - name: 6. Oczyszczenie środowiska docelowego z aplikacji
      file:
        path: /opt/my-app.tar.gz
        state: absent
