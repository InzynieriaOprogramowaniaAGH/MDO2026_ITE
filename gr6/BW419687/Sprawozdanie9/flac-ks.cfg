# Generated by Anaconda 44.30
# Keyboard layouts
keyboard --vckeymap=pl --xlayouts='pl'
# System language
lang pl_PL.UTF-8
cmdline

%packages
@^custom-environment
wget
%end

# --- DODANE REPOZYTORIA FEDORY 38 ---
# Główne repozytorium Fedory 38
url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-38&arch=x86_64
# Repozytorium aktualizacji
repo --name=update --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f38&arch=x86_64
# --- KONIEC DODANYCH REPOZYTORIÓW ---

# Run the Setup Agent on first boot
firstboot --enable

# Generated using Blivet version 3.13.2
ignoredisk --only-use=sda
autopart
# Partition clearing information
clearpart --all --initlabel

# System timezone
timezone Europe/Warsaw --utc

# --- DODANA NAZWA HOSTA ---
network --hostname=fedora-flac
# --- KONIEC DODANIA NAZWY HOSTA ---

# Root password
rootpw --iscrypted --allow-ssh $y$j9T$72XsqrYGZlGNYWrrDpIe/2xz$s5ScwL7iFrB5E8gPYcD0YP1ThyC7Bgb/v/qAid9Dgr1
user --groups=wheel --name=barwali --password=$y$j9T$nXnlKN7rJydQkz9SG9lUURgv$B.FnO/yshpCt4zFfJzovo8877fawQj70Eg1tl/F7RE0 --iscrypted --gecos="Bartłomiej Waliłko"

# Pobieranie potrzebnych plików FLAC
%post

wget https://github.com/Garnn/flac/releases/download/Comp/flac /usr/bin/
wget https://github.com/Garnn/flac/releases/download/Comp/libFLAC++.so /usr/lib/
wget https://github.com/Garnn/flac/releases/download/Comp/libFLAC.so /usr/lib/
ldconfig
# Plik usługi systemd do jednorazowego testu
cat > /etc/systemd/system/flac-test.service << EOF
[Unit]
Description=Test uruchomienia FLAC

[Service]
Type=oneshot
ExecStart=/usr/bin/flac --version
User=root
Group=root

[Install]
WantedBy=multi-user.target
EOF

systemctl enable flac-test.service
%end

reboot
