apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-recreate
spec:
  replicas: 4
  strategy:
    type: Recreate          # strategia
  selector:
    matchLabels:
      app: nginx
      strategy: recreate
  template:
    metadata:
      labels:
        app: nginx
        strategy: recreate
        version: v2
    spec:
      containers:
      - name: nginx
        image: my-nginx:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-recreate-svc
spec:
  selector:
    app: nginx
    strategy: recreate
  ports:
    - port: 80
      targetPort: 80
  type: NodePort