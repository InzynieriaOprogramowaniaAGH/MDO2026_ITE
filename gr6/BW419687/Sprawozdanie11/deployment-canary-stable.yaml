apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
      track: stable
  template:
    metadata:
      labels:
        app: nginx
        track: stable
        version: v1
    spec:
      containers:
      - name: nginx
        image: my-nginx:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80