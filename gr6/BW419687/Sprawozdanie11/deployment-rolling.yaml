apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-rolling
spec:
  replicas: 6
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2          # >1
      maxSurge: 25%              # >20%
  selector:
    matchLabels:
      app: nginx
      strategy: rolling
  template:
    metadata:
      labels:
        app: nginx
        strategy: rolling
        version: v2
    spec:
      containers:
      - name: nginx
        image: my-nginx:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-rolling-svc
spec:
  selector:
    app: nginx
    strategy: rolling
  ports:
    - port: 80
      targetPort: 80
  type: NodePort