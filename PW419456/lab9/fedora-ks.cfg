url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-44&arch=x86_64
repo --name=updates --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f44&arch=x86_64
reboot

keyboard --vckeymap=pl --xlayouts='pl'
lang pl_PL.UTF-8
timezone Europe/Warsaw --utc

network --bootproto=dhcp --device=link --activate
network --hostname=fedora-pw419456-auto

rootpw --plaintext admin
user --name=ansible --password=admin --groups=wheel

zerombr
clearpart --all --initlabel
autopart --type=lvm

%packages
@core
moby-engine
tar
wget
%end

%post --erroronfail --log=/root/ks-post.log
exec < /dev/tty3 > /dev/tty3 2>&1
chvt 3
echo "=========================================================="
echo "Rozpoczynam konfiguracje poinstalacyjna..."
echo "=========================================================="

systemctl enable docker.service

cat <<EOF > /etc/systemd/system/libsodium-app.service
[Unit]
Description=Run Libsodium Docker Container (PW419456)
After=docker.service
Requires=docker.service

[Service]
Restart=always
ExecStartPre=-/usr/bin/docker pull piti83/libsodium-runtime:latest
ExecStart=/usr/bin/docker run --rm --name libsodium-app piti83/libsodium-runtime:latest sleep infinity
ExecStop=/usr/bin/docker stop -t 2 libsodium-app

[Install]
WantedBy=multi-user.target
EOF

systemctl enable libsodium-app.service

echo "Konfiguracja zakonczona. Za chwile nastapi restart."
sleep 5
chvt 1
%end