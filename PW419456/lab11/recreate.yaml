apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab11-recreate
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: recreate-app
  template:
    metadata:
      labels:
        app: recreate-app
    spec:
      containers:
      - name: nginx-container
        image: piti83/lab11-nginx:v2