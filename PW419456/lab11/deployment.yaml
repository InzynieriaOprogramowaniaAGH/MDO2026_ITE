apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab11-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: lab11-app
  template:
    metadata:
      labels:
        app: lab11-app
    spec:
      containers:
      - name: nginx-container
        image: piti83/lab11-nginx:v1
        ports:
        - containerPort: 80