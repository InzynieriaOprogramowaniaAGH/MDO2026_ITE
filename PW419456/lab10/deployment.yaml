apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab10-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: lab10-app
  template:
    metadata:
      labels:
        app: lab10-app
    spec:
      containers:
      - name: nginx-container
        image: piti83/k8s-nginx-app:latest
        ports:
        - containerPort: 80
