apiVersion: apps/v1
kind: Deployment
metadata:
  name: moja-aplikacja-rolling
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 25%
  selector:
    matchLabels:
      app: moja-aplikacja
  template:
    metadata:
      labels:
        app: moja-aplikacja
    spec:
      containers:
      - name: app
        image: al5ksandra/moja-aplikacja:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 80