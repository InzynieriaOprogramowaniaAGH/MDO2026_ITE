apiVersion: apps/v1
kind: Deployment
metadata:
  name: moja-aplikacja-deployment
  labels:
    app: moja-aplikacja
spec:
  replicas: 4
  selector:
    matchLabels:
      app: moja-aplikacja
  template:
    metadata:
      labels:
        app: moja-aplikacja
    spec:
      containers:
      - name: nginx-app
        image: moja-aplikacja:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80