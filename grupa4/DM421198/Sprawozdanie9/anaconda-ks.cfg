
reboot

keyboard --vckeymap=pl --xlayouts='pl'

lang pl_PL.UTF-8

network  --bootproto=dhcp --device=enp0s3 --ipv6=auto --activate
network  --hostname=fedora-kickstart

url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-38&arch=x86_64
repo --name=update --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f38&arch=x86_64

%packages
@^server-product-environment
dnf-plugins-core
tar
wget
curl
%end

# Run the Setup Agent on first boot
firstboot --enable

# Generated using Blivet version 3.7.1
ignoredisk --only-use=sda
autopart
# Partition clearing information
clearpart --none --initlabel

timezone Europe/Warsaw --utc

rootpw --iscrypted --allow-ssh $y$j9T$aOvwbzE/.wbiNXWhFojS7wUd$mbXe07CVE0CMGUUuXrksfU7PgKGf.u4r3hOWqNJPCr1

%post --log=/root/ks-post.log

dnf config-manager --add-repo=https://download.docker.com/linux/fedora/docker-ce.repo

dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

systemctl enable docker

cat << 'EOF' > /etc/systemd/system/moj-pipeline.service
[Unit]
Description=Uruchomienie kontenera po restarcie
After=docker.service
Requires=docker.service

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStartPre=/usr/bin/docker pull dpage/pgadmin4:latest
ExecStart=/usr/bin/docker run -d --name aplikacja-pipeline -p 80:80 -e 'PGADMIN_DEFAULT_EMAIL=admin@admin.com' -e 'PGADMIN_DEFAULT_PASSWORD=admin' dpage/pgadmin4:latest
[Install]
WantedBy=multi-user.target
EOF

systemctl enable moj-pipeline.service
%end