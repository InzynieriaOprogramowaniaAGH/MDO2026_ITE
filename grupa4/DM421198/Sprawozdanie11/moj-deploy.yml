apiVersion: apps/v1
kind: Deployment
metadata:
  name: moja-aplikacja-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moja-aplikacja
  template:
    metadata:
      labels:
        app: moja-aplikacja
    spec:
      containers:
      - name: aplikacja
        image: moja-aplikacja:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
