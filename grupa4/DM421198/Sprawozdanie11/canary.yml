apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-stabilne
spec:
  replicas: 3
  selector:
    matchLabels:
      app: moja-aplikacja
  template:
    metadata:
      labels:
        app: moja-aplikacja
    spec:
      containers:
      - name: kontener
        image: moja-aplikacja:v1
        imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-testowe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moja-aplikacja
  template:
    metadata:
      labels:
        app: moja-aplikacja
        track: canary
    spec:
      containers:
      - name: kontener
        image: moja-aplikacja:v2
        imagePullPolicy: Never
