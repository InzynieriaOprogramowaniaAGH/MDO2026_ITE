apiVersion: apps/v1
kind: Deployment
metadata:
  name: wdrozenie-recreate
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: moja-aplikacja
  template:
    metadata:
      labels:
        app: moja-aplikacja
    spec:
      containers:
      - name: kontener
        image: moja-aplikacja:v1
        imagePullPolicy: Never
