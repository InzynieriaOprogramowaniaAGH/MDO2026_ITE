apiVersion: apps/v1
kind: Deployment
metadata:
  name: wdrozenie-rolling
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 25%
  selector:
    matchLabels:
      app: moja-aplikacja
  template:
    metadata:
      labels:
        app: moja-aplikacja
    spec:
      containers:
      - name: kontener
        image: moja-aplikacja:v1
        imagePullPolicy: Never
