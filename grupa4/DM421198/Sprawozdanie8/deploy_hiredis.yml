---
- name: Zarządzanie artefaktem hiredis 
  hosts: Endpoints
  become: yes
  tasks:
    - name: Sanity Check - Sprawdź zasoby przed wdrożeniem
      ansible.builtin.shell: df -h / | tail -1 | awk '{print $4}'
      register: disk_free
      ignore_errors: yes  

    - name: Instalacja Dockera na maszynie docelowej
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Wyślij artefakt na Target
      ansible.builtin.copy:
        src: ./hiredis-paczka.tar.gz  
        dest: /tmp/hiredis-paczka.tar.gz
        mode: '0644'

    - name: Rozpakuj bibliotekę libhiredis.so
      ansible.builtin.unarchive:
        src: /tmp/hiredis-paczka.tar.gz
        dest: /tmp/
        remote_src: yes

    - name: Uruchom kontener i udostępnij w nim bibliotekę
      ansible.builtin.command: >
        docker run -d --name hiredis_app
        -v /tmp/libhiredis.so:/usr/lib/libhiredis.so:ro
        debian:bookworm-slim tail -f /dev/null
      register: docker_run

    - name: Weryfikacja poprawnego wdrożenia (Sanity Check)
      ansible.builtin.command: docker exec hiredis_app ls -lh /usr/lib/libhiredis.so
      register: verification
      failed_when: "'libhiredis.so' not in verification.stdout"

    - name: Wyświetl raport końcowy
      ansible.builtin.debug:
        msg: "Wdrożenie zakończone. Wynik weryfikacji: {{ verification.stdout }}"

    - name: Oczyść środowisko (Cleanup)
      ansible.builtin.command: docker rm -f hiredis_app