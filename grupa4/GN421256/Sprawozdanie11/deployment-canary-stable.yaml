apiVersion: apps/v1
kind: Deployment
metadata:
  name: gn-nginx-stable
  labels:
    app: gn-nginx-canary
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gn-nginx-canary
      track: stable
  template:
    metadata:
      labels:
        app: gn-nginx-canary
        track: stable
        version: v1
    spec:
      containers:
      - name: gn-nginx
        image: gn-nginx:1.0
        ports:
        - containerPort: 80
