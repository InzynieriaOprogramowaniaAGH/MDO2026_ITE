---
- name: Sanity check - host odpowiada
  ansible.builtin.ping:

- name: Sanity check - plik artefaktu istnieje na dyrygencie
  ansible.builtin.stat:
    path: "{{ deploy_tar }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: tar_stat

- name: Przerwij gdy brak artefaktu .tar
  ansible.builtin.fail:
    msg: "Brak {{ deploy_tar }} - skopiuj .tar do Sprawozdanie8/artifacts/"
  when: not tar_stat.stat.exists
  delegate_to: localhost
  become: false
  run_once: true

- name: Instalacja Dockera (apt)
  ansible.builtin.apt:
    name:
      - docker.io
      - ca-certificates
    state: present
    update_cache: true

- name: Uruchom i wlacz docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Dodaj uzytkownika ansible do grupy docker
  ansible.builtin.user:
    name: ansible
    groups: docker
    append: true

- name: Skopiuj artefakt .tar na maszyne docelowa
  ansible.builtin.copy:
    src: "{{ deploy_tar }}"
    dest: /tmp/axios-deploy-image.tar
    mode: "0644"

- name: Zaladuj obraz z pliku tar
  ansible.builtin.command: docker load -i /tmp/axios-deploy-image.tar
  register: docker_load
  changed_when: "'Loaded image' in docker_load.stdout"

- name: Uruchom kontener deploy (smoke)
  ansible.builtin.command: >
    docker run --rm --name {{ container_name }}
    {{ deploy_image }}
    sh -lc "test -d dist && echo 'SMOKE OK: dist exists' && ls -la dist | head -n 5"
  register: container_run
  changed_when: true

- name: Weryfikacja - smoke test w kontenerze
  ansible.builtin.assert:
    that:
      - "'SMOKE OK' in container_run.stdout"
    fail_msg: "Kontener nie zwrocil oczekiwanego smoke testu"
    success_msg: "Kontener uruchomiony poprawnie: {{ container_run.stdout }}"

- name: Czyszczenie - usun plik tar z target
  ansible.builtin.file:
    path: /tmp/axios-deploy-image.tar
    state: absent

- name: Czyszczenie - usun obraz docker (opcjonalnie)
  ansible.builtin.command: docker image rm -f {{ deploy_image }}
  register: image_rm
  changed_when: image_rm.rc == 0
  failed_when: false
