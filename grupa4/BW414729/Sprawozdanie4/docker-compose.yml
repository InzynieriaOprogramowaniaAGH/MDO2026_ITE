version: '3.8'
services:
  # Pomocnik DIND
  docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    networks:
      - jenkins
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - jenkins-docker-certs:/certs
      - jenkins-data:/var/jenkins_home
    ports:
      - "2376:2376"

  # Serwer Jenkins
  jenkins:
    image: jenkins/jenkins:2.462.3-jdk17
    container_name: jenkins-blueocean
    networks:
      - jenkins
    environment:
      DOCKER_HOST: tcp://docker:2376
      DOCKER_CERT_PATH: /certs/client
      DOCKER_TLS_VERIFY: 1
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - jenkins-docker-certs:/certs/client:ro

networks:
  jenkins:

volumes:
  jenkins-docker-certs:
  jenkins-data: