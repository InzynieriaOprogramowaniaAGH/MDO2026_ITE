apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-app
  labels:
    app: express-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: express-app
  template:
    metadata:
      labels:
        app: express-app
        version: v1.0
    spec:
      containers:
      - name: express-app
        image: szymonmakow/express-app:v3.0-broken
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: express-app-svc
spec:
  selector:
    app: express-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: NodePort
