apiVersion: v1
kind: Service
metadata:
  name: lab11-service
spec:
  type: NodePort
  selector:
    app: lab11-app
  ports:
    - port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab11-main
spec:
  replicas: 3
  selector:
    matchLabels:
      app: lab11-app
  template:
    metadata:
      labels:
        app: lab11-app
        track: stable
    spec:
      containers:
      - name: web
        image: moja-apka:v1
        imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab11-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lab11-app
  template:
    metadata:
      labels:
        app: lab11-app
        track: canary
    spec:
      containers:
      - name: web
        image: moja-apka:v2
        imagePullPolicy: Never
