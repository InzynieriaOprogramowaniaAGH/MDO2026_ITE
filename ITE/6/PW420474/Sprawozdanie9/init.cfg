text
reboot
keyboard pl
lang pl_PL.UTF-8
timezone Europe/Warsaw --utc

url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-$releasever&arch=$basearch
repo --name=updates --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f$releasever&arch=$basearch
repo --name=docker-ce-stable --baseurl=https://download.docker.com/linux/fedora/$releasever/$basearch/stable

network --bootproto=dhcp --device=link --hostname=fedora-node-01 --activate

ignoredisk --only-use=sda
clearpart --all --initlabel
autopart --type=lvm

rootpw --plaintext 123
user --name=pw --groups=wheel --password=123 --plaintext

%packages
@core
curl
wget
docker-ce
docker-ce-cli
containerd.io
%end

%post --log=/root/ks-post-install.log
exec < /dev/tty3 > /dev/tty3
echo "RUNNING POST-INSTALL"

systemctl enable docker

cat <<EOF > /etc/systemd/system/app-deploy.service
[Unit]
Description=Deploy App
After=docker.service
Requires=docker.service

[Service]
Type=oneshot
ExecStart=/usr/bin/docker run -d --name app-container -p 80:80 hello-world
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF

systemctl enable app-deploy.service
%end
