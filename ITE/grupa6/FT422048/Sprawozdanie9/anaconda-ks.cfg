url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-44&arch=aarch64
repo --name=updates --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f44&arch=aarch64

text
reboot

keyboard --vckeymap=pl --xlayouts='pl'
lang pl_PL.UTF-8
timezone Europe/Warsaw --utc

network --bootproto=dhcp --device=link --activate
network --hostname=redis-host

rootpw --plaintext devops
user --name=ansible --password=devops --groups=wheel

zerombr
clearpart --all --initlabel
autopart --type=lvm

%packages
@core
moby-engine
tar
wget
%end

%post --erroronfail --log=/root/ks-post.log
exec < /dev/tty3 > /dev/tty3 2>&1
chvt 3

echo "=========================================================="
echo "Rozpoczynam konfiguracje poinstalacyjna..."
echo "=========================================================="

systemctl enable docker.service

cat <<EOF > /etc/systemd/system/moj-redis.service
[Unit]
Description=Run Redis Docker Container
After=docker.service
Requires=docker.service

[Service]
Restart=always
ExecStartPre=-/usr/bin/docker pull redis:latest
ExecStartPre=-/usr/bin/docker rm -f auto-redis
ExecStart=/usr/bin/docker run --name auto-redis -p 6379:6379 redis:latest
ExecStop=/usr/bin/docker stop -t 2 auto-redis

[Install]
WantedBy=multi-user.target
EOF

systemctl enable moj-redis.service

echo "Konfiguracja zakonczona. Za chwile nastapi restart."
sleep 5
chvt 1
%end
