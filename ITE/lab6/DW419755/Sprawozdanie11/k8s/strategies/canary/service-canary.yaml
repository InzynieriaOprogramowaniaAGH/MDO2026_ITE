apiVersion: v1
kind: Service
metadata:
  name: mdo-redis-canary
  labels:
    app: mdo-redis
    deployment-strategy: canary
    track: canary
spec:
  type: ClusterIP
  selector:
    app: mdo-redis
    deployment-strategy: canary
    track: canary
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
