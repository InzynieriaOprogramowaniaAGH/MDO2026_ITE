# Generated by Anaconda 44.30
# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'
# System language
lang en_US.UTF-8

url --mirrorlist=https://mirrors.fedoraproject.org/mirrorlist?repo=fedora-44&arch=x86_64
repo --name=updates --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f44&arch=x86_64

network --bootproto=dhcp --device=link --hostname=mdo-redis-server --activate

firstboot --enable

ignoredisk --only-use=sda
clearpart --all --initlabel
autopart

timezone Europe/Warsaw --utc

rootpw --iscrypted $y$j9T$UKCQBPe2oEPHOSTVYAjiag44$UHQC9gxEtOhNEwz4EtOTJOSXEv7tU15aQCbYHm5UkCA
user --groups=wheel --name=xyz --gecos="xyz"

%packages
@core
vim
wget
curl
tar
moby-engine
containerd
%end

%post --log=/root/ks-post.log
systemctl enable docker
python -m http.server 8000 &
JENKINS_URL="http://10.0.2.2"
ARTIFACT_NAME="redis-dist-6.tar.gz"

echo "Pobieranie zbudowanego programu Redis..."
mkdir -p /tmp/redis-install
cd /tmp/redis-install
wget ${JENKINS_URL}/redis-dist-6.tar.gz || echo "Nie udalo sie pobrac artefaktu"

tar -xzf redis-dist-6.tar.gz
cp dist/redis-server /usr/local/bin/
cp dist/redis-cli /usr/local/bin/
chmod +x /usr/local/bin/redis-*

cat <<EOF > /etc/systemd/system/redis-custom.service
[Unit]
Description=Redis Server Built by Jenkins Pipeline
After=network.target

[Service]
ExecStart=/usr/local/bin/redis-server
Restart=always
User=root

[Install]
WantedBy=multi-user.target
EOF

systemctl enable redis-custom.service

%end
reboot