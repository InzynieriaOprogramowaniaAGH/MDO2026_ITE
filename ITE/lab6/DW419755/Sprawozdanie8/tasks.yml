---
- name: Zadania inwentaryzacyjne i administracyjne
  hosts: all
  become: yes 
  tasks:

    - name: 1. Wyślij żądanie ping do wszystkich maszyn
      ansible.builtin.ping:

    - name: 2. Skopiuj plik inwentaryzacji na maszyny Endpoints
      ansible.builtin.copy:
        src: ./inventory.ini
        dest: /home/{{ ansible_user }}/inventory_backup.ini
        owner: "{{ ansible_user }}"
        mode: '0644'
      when: "'Endpoints' in group_names"

    - name: 3. Zaktualizuj listę pakietów (apt update)
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
      when: ansible_os_family == "Debian"

    - name: 4. Zrestartuj usługę SSHD
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: 5. Zrestartuj usługę RNGD
      ansible.builtin.service:
        name: rng-tools
        state: restarted
      ignore_errors: yes
