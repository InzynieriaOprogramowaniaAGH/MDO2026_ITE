name: ino_dev build

on:
  push:
    branches: [ino_dev]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config tcl

      - name: Build Redis
        run: make -j"$(nproc)"

      - name: Smoke test
        run: |
          ./src/redis-server --version
          ./src/redis-cli --version

      - name: Package binaries
        run: |
          mkdir -p artifact
          cp src/redis-server src/redis-cli artifact/
          tar -czvf redis-build.tar.gz -C artifact .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: redis-binaries-${{ github.sha }}
          path: redis-build.tar.gz
          retention-days: 7