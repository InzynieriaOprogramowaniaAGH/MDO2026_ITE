apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-canary-test
      track: stable
  template:
    metadata:
      labels:
        app: app-canary-test
        track: stable
    spec:
      containers:
      - name: app-container
        image: app:v1
        ports:
        - containerPort: 80
