apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfinder-stable
  labels:
    app: portfinder-canary
    track: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: portfinder-canary
      track: stable
  template:
    metadata:
      labels:
        app: portfinder-canary
        track: stable
        version: v1
    spec:
      containers:
      - name: portfinder-container
        image: portfinder-web:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80
