apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfinder-deployment
  labels:
    app: portfinder-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: portfinder-app
  template:
    metadata:
      labels:
        app: portfinder-app
        version: v1
    spec:
      containers:
      - name: portfinder-container
        image: portfinder-web:broken
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portfinder-service
spec:
  type: NodePort
  selector:
    app: portfinder-app
  ports:
  - port: 80
    nodePort: 30080
