apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfinder-recreate
  labels:
    app: portfinder-recreate
    strategy: recreate
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: portfinder-recreate
  template:
    metadata:
      labels:
        app: portfinder-recreate
        version: v1
    spec:
      containers:
      - name: portfinder-container
        image: portfinder-web:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portfinder-recreate-svc
spec:
  type: NodePort
  selector:
    app: portfinder-recreate
  ports:
  - port: 80
    nodePort: 30081
