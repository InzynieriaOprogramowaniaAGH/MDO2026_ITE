apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfinder-rolling
  labels:
    app: portfinder-rolling
    strategy: rolling-update
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 25%
  selector:
    matchLabels:
      app: portfinder-rolling
  template:
    metadata:
      labels:
        app: portfinder-rolling
        version: v1
    spec:
      containers:
      - name: portfinder-container
        image: portfinder-web:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: portfinder-rolling-svc
spec:
  type: NodePort
  selector:
    app: portfinder-rolling
  ports:
  - port: 80
    nodePort: 30082
