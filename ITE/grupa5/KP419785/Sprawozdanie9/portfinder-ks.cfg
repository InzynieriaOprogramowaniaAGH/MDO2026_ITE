#version=DEVEL
# Instalacja nienadzorowana - portfinder deployment
# Autor: KP419785
# Tryb instalacji (tryb tekstowy, bez GUI)
text
# Automatyczny restart po instalacji
reboot

# Repozytoria 
url --mirrorlist=https://mirrors.fedoraproject.org/mirrorlist?repo=fedora-44&arch=x86_64
repo --name=updates --mirrorlist=https://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f44&arch=x86_64

# Ustawienia klawiatury i języka
keyboard --xlayouts='pl'
lang pl_PL.UTF-8

# Ustawienia sieciowe
network --bootproto=dhcp --device=link --activate
network --hostname=fedora-portfinder

# Haslo roota (wygenerowany hash)
rootpw --iscrypted $6$AQr8Oq6IeErKqB/j$kLkmOc3gQwuupTnUVCnmDG8Drd1y1jCj1S969k3IHTt/mmatZv8/SpDUmt/HjfuwLvOGFB1B2g.k6wusVgkn6/

# Ustawienia czasu
timezone Europe/Warsaw --utc

# Partycjonowanie dysku
ignoredisk --only-use=sda
clearpart --all --initlabel
autopart

# Pakiety do instalacji
%packages
@^minimal-environment
curl
wget
git
%end

# Sekcja post-instalacyjna
%post --log=/root/ks-post.log
set -x
echo "Instalacja Dockera"
# Dodanie repozytorium Docker CE dla Fedory
dnf -y install dnf-plugins-core
dnf config-manager --add-repo https://download.docker.com/linux/fedora/docker-ce.repo

# Instalacja Docker CE
dnf -y install docker-ce docker-ce-cli containerd.io docker-compose-plugin

# Wlaczenie Dockera przy starcie systemu
systemctl enable docker

echo "Pobieranie artefaktu portfinder"
IP_DEVOPS="192.168.1.34"
wget -q "http://${IP_DEVOPS}:8000/portfinder-12.tar.gz" -O /root/portfinder-12.tar.gz

echo "Tworzenie serwisu systemd dla portfinder"
cat > /etc/systemd/system/portfinder.service << 'EOF'
[Unit]
Description=Portfinder Docker Container
After=docker.service network-online.target
Requires=docker.service
Wants=network-online.target

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStartPre=-/usr/bin/docker rm -f portfinder
ExecStartPre=/usr/bin/docker load -i /root/portfinder-12.tar.gz
ExecStart=/usr/bin/docker run -d --name portfinder --restart=unless-stopped app-deploy
ExecStop=/usr/bin/docker stop portfinder

[Install]
WantedBy=multi-user.target
EOF

systemctl enable portfinder.service
echo "Instalacja zakończona"
%end
