text
eula --agreed

url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-43&arch=x86_64
repo --name=update --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f43&arch=x86_64

network --bootproto=dhcp --device=link --activate --hostname=fedora-server

lang pl_PL.UTF-8
keyboard --vckeymap=pl --xlayouts='pl'

authselect enable-feature with-fingerprint
firstboot --disable

clearpart --all --initlabel
autopart --type=lvm

timezone Europe/Warsaw --utc

rootpw --iscrypted --allow-ssh $y$j9T$hVtbmvQ7SjeX2GRbXCvIRfb2$7wZhhFPvWlOKd8PRVzZNSHApZap8Cuf.WzkhUySdTi6
user --groups=wheel --name=jp --password=$y$j9T$YUaVAFCgy.mZP6QYapqIGL35$XNvvkoQZ0FSzTyiynb6brLYwhtaQRWPawfVIzMEGB// --iscrypted --gecos="jp"

%packages
@^server-product-environment
%end

%post
set -ex
exec > /root/ks-post.log 2>&1

curl -f -o /tmp/cjson-artifact.tar.gz http://10.37.38.163:8000/cjson-artifact.tar.gz
mkdir -p /opt/cjson_app
tar -xzvf /tmp/cjson-artifact.tar.gz -C /opt/cjson_app
cp /opt/cjson_app/libcjson.so* /usr/local/lib/
ldconfig 
cp /opt/cjson_app/test_app /usr/local/bin/cjson_app
chmod +x /usr/local/bin/cjson_app

systemctl enable docker

cat <<EOF > /etc/systemd/system/cjson_app.service
[Unit]
Description=CJSON
After=network.target

[Service]
ExecStart=/usr/local/bin/cjson_app
Restart=always
User=root
Environment=LD_LIBRARY_PATH=/usr/local/lib

[Install]
WantedBy=multi-user.target
EOF

systemctl enable cjson_app.service
%end

reboot