apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab11-recreate
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lab11-recreate
  template:
    metadata:
      labels:
        app: lab11-recreate
    spec:
      containers:
      - name: web
        image: moja-apka:v1
        imagePullPolicy: Never
