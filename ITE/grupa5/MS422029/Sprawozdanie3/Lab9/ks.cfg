
text
reboot


keyboard --vckeymap=pl --xlayouts='pl'
lang pl_PL.UTF-8
timezone Europe/Warsaw


network --bootproto=dhcp --device=link --activate
network --hostname=fedora-z-dockerem

clearpart --all --initlabel
autopart --type=lvm


url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-44&arch=x86_64
repo --name=update --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f44&arch=x86_64

rootpw --plaintext mateusz
user --name=mateusz --password=123 --groups=wheel

%packages
@core
moby-engine
tar
wget
%end

%post --interpreter=/bin/bash --log=/root/ks-post.log
exec < /dev/tty3 > /dev/tty3
chvt 3

echo "============================================="
echo " TWORZENIE USLUGI STARTOWEJ DOCKERA...       "
echo "============================================="

systemctl enable docker

cat <<EOF > /etc/systemd/system/uruchom-apke.service
[Unit]
Description=Start testowego kontenera
After=docker.service
Requires=docker.service

[Service]
Type=simple
ExecStart=/usr/bin/docker run -p 8080:80 nginx:latest
Restart=always

[Install]
WantedBy=multi-user.target
EOF

systemctl enable uruchom-apke.service

echo "USLUGA UTWORZONA. ZA CHWILE RESTART."
sleep 5
chvt 1
%end
