---
- name: Pierwsze operacje zdalne
  hosts: all
  become: yes

  tasks:
    - name: 1. Wyslanie zadania ping
      ansible.builtin.ping:

    - name: 2. Skopiowanie pliku inwentaryzacji na Endpoints
      ansible.builtin.copy:
        src: ./inventory.ini
        dest: /tmp/inventory.ini
      when: "'Endpoints' in group_names"

    - name: 3. Aktualizacja pakietow (apt update)
      ansible.builtin.apt:
        update_cache: yes
      when: "'Endpoints' in group_names"

    - name: 4. Restart uslug sshd i rngd
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - ssh
        - rng-tools-debian
      when: "'Endpoints' in group_names"
      ignore_errors: yes
