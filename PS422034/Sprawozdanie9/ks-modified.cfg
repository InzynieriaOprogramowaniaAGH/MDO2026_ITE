# Generated by Anaconda 42 - zmodyfikowany PS422034
#version=DEVEL

keyboard --vckeymap=pl --xlayouts='pl'
lang pl_PL.UTF-8

# Hostname
network --bootproto=dhcp --onboot=yes
network --hostname=fedora-ps422034

%packages
@^server-product-environment
docker
curl
wget
%end

firstboot --disable

ignoredisk --only-use=sda
autopart
clearpart --all --initlabel

timezone Europe/Warsaw --utc

rootpw --plaintext rootpass123
user --groups=wheel --name=student --password=student123 --plaintext

reboot

%post --log=/root/ks-post.log
exec > /dev/tty3 2>&1
echo "=== Wlaczanie Docker ==="
systemctl enable docker

cat > /usr/local/bin/start-express.sh << 'SCRIPT'
#!/bin/bash
docker run -d --name express-app --restart=always -p 3000:3000 node:latest sh -c "node -e \"const app=require('express')(); app.get('/',(req,res)=>res.send('OK')); app.listen(3000);\""
SCRIPT

chmod +x /usr/local/bin/start-express.sh

cat > /etc/systemd/system/express-app.service << 'SERVICE'
[Unit]
Description=Express App
After=docker.service network-online.target
Requires=docker.service

[Service]
ExecStart=/usr/local/bin/start-express.sh
Restart=on-failure
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
SERVICE

systemctl enable express-app.service
echo "=== Post-instalacja zakonczona ==="
%end
