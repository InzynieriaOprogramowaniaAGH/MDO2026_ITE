---
- name: Ping wszystkich hostów
  hosts: all
  tasks:
    - name: Ping
      ansible.builtin.ping:

- name: Konfiguracja Endpoints
  hosts: Endpoints
  become: yes
  tasks:

    - name: Skopiuj plik inwentaryzacji
      ansible.builtin.copy:
        src: ~/ansible/inventory.ini
        dest: /home/ansible/inventory.ini
        owner: ansible
        mode: '0644'

    - name: Zaktualizuj pakiety
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
      ignore_errors: yes

    - name: Restart sshd
      ansible.builtin.service:
        name: ssh
        state: restarted

    - name: Restart rngd (ignoruj błąd jeśli nie istnieje)
      ansible.builtin.service:
        name: rngd
        state: restarted
      ignore_errors: yes
