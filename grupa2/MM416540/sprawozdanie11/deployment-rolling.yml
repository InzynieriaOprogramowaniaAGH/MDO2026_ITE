apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-rolling
  labels:
    app: express-rolling
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2        # max 2 pody niedostępne naraz
      maxSurge: 2              # max 2 dodatkowe pody ponad replicas (50%)
  selector:
    matchLabels:
      app: express-rolling
  template:
    metadata:
      labels:
        app: express-rolling
        version: "5.2.1"
    spec:
      containers:
      - name: express-app
        image: express-prod:5.2.1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000