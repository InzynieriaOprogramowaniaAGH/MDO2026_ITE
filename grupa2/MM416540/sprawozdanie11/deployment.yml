apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-deployment
  labels:
    app: express-app
spec:
#  replicas: 4
#  replicas: 8
  replicas: 1
  selector:
    matchLabels:
      app: express-app
  template:
    metadata:
      labels:
        app: express-app
    spec:
      containers:
      - name: express-app
        image: express-prod:5.2.1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000