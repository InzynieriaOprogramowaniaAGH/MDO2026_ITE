# Generated by Anaconda 44.30

# Repozytoria (wymagane dla instalatora sieciowego)
url --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=fedora-41&arch=x86_64
repo --name=updates --mirrorlist=http://mirrors.fedoraproject.org/mirrorlist?repo=updates-released-f41&arch=x86_64

# Keyboard layouts
keyboard --vckeymap=pl --xlayouts='pl'

# System language
lang pl_PL.UTF-8

# System timezone
timezone Europe/Warsaw --utc

# Hostname – zmieniony z domyślnego localhost
network --bootproto=dhcp --device=eth0 --onboot=yes
network --hostname=express-host

# Root password
rootpw --iscrypted --allow-ssh $y$j9T$V5memf/8H9u1.jfEH9AptnbC$m1fOYk9CdGM/qrJsw.5xy6j3BieXTVRCfXUS9L8xrM8

# Dysk – zawsze formatuj cały (zmiana z clearpart --none)
ignoredisk --only-use=sda
clearpart --all --initlabel --drives=sda
autopart

# Pozostałe
authselect enable-feature with-fingerprint
firstboot --enable

# Automatyczny restart po instalacji
reboot --eject

%packages
@^server-product-environment
@container-management
@domain-client
@guest-agents
@server-hardware-support
curl
wget
tar
%end

%post --log=/var/log/kickstart-post.log
exec 1>/dev/tty3 2>&1
chvt 3

echo "=== START POST-INSTALL ==="

# Instalacja Dockera
dnf -y install dnf-plugins-core
dnf config-manager --add-repo https://download.docker.com/linux/fedora/docker-ce.repo
dnf -y install docker-ce docker-ce-cli containerd.io

# Docker startuje przy restarcie
systemctl enable docker

# Skrypt uruchamiający kontener
cat > /usr/local/bin/start-express.sh << 'SCRIPT'
#!/bin/bash
docker run -d \
  --name express-app \
  --restart=always \
  -p 3000:3000 \
  express-prod:5.2.1
echo "Express uruchomiony na porcie 3000"
SCRIPT

chmod +x /usr/local/bin/start-express.sh

# Systemd service
cat > /etc/systemd/system/express-app.service << 'SERVICE'
[Unit]
Description=Express.js App Container
After=docker.service network-online.target
Requires=docker.service

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/usr/local/bin/start-express.sh
ExecStop=docker stop express-app

[Install]
WantedBy=multi-user.target
SERVICE

systemctl enable express-app.service

echo "=== POST-INSTALL ZAKOŃCZONY ==="
%end