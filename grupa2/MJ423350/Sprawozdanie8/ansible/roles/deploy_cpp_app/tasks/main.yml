---
# tasks file for deploy_cpp_app
- name: Sprawdzenie wolnego miejsca na dysku (Sanity Check)
  ansible.builtin.shell: df -h / | tail -1 | awk '{print $4}'
  register: disk_space
  changed_when: false

- name: Wyswietl info o miejscu na dysku
  ansible.builtin.debug:
    msg: "Dostępne miejsce na maszynie docelowej: {{ disk_space.stdout }}"

- name: Przerwij, jeśli mało miejsca (poniżej 1GB)
  ansible.builtin.assert:
    that: "disk_space.stdout is not search('M')"
    fail_msg: "Za mało miejsca na dysku! Wymagane GB."
  ignore_errors: false


- name: Zainstaluj zależności systemowe
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg, python3-pip, python3-requests, python3-docker]
    state: present
    update_cache: yes

- name: Stwórz katalog na klucze GPG
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Pobierz klucz GPG Dockera
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Dodaj repozytorium Dockera
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    filename: docker

- name: Zainstaluj Docker Engine
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
    state: present
    update_cache: yes

- name: Upewnij się, że Docker działa
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

- name: Stwórz katalog na aplikację
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    mode: '0755'

- name: Prześlij plik binarny na maszynę docelową
  ansible.builtin.copy:
    src: "{{ binary_name }}"
    dest: "{{ app_dir }}/{{ binary_name }}"
    mode: '0755'

- name: Nadaj uprawnienia do zapisu dla profilowania
  ansible.builtin.file:
    path: "{{ app_dir }}"
    mode: '0777'

- name: Uruchom aplikację w kontenerze (z zależnościami)
  community.docker.docker_container:
    name: cpp-app-container
    image: ubuntu:24.04
    state: started
    restart_policy: no
    volumes:
      - "{{ app_dir }}/{{ binary_name }}:/app/{{ binary_name }}"
    command: >
      bash -c "apt-get update -qq > /dev/null 2>&1 && 
                apt-get install -y -qq libncurses-dev > /dev/null 2>&1 && 
                /app/{{ binary_name }}"
  register: container_info

- name: Zweryfikuj, czy kontener ruszył poprawnie
  ansible.builtin.assert:
    that:
      - container_info.container.State.Running == true or container_info.container.State.ExitCode == 0
    fail_msg: "Aplikacja nie uruchomiła się poprawnie w kontenerze!"

- name: Poczekaj, aż binarka skończy działanie
  ansible.builtin.shell: "docker wait cpp-app-container"
  changed_when: false

- name: Pobierz logi z kontenera dla potwierdzenia
  ansible.builtin.shell: "docker logs cpp-app-container"
  register: app_logs
  changed_when: false

- name: Wyświetl logi aplikacji
  ansible.builtin.debug:
    var: app_logs.stdout_lines

- name: Oczyść środowisko (zatrzymaj i usuń kontener)
  community.docker.docker_container:
    name: cpp-app-container
    state: absent