apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-deployment
  labels:
    app: node-app

spec:
  replicas: 4
  
  selector:
    matchLabels:
      app: node-app
  
  template:
    metadata:
      labels:
        app: node-app
    
    spec:
      containers:
      - name: node-container
        image: martix1008/k8s-app:v1
        ports:
        - containerPort: 8080