apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplikacja-canary-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: moja-aplikacja-canary
  template:
    metadata:
      labels:
        app: moja-aplikacja-canary
        version: v1
    spec:
      containers:
      - name: nginx-container
        image: app:v1
        ports:
        - containerPort: 80


