apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplikacja-canary-new
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moja-aplikacja-canary
  template:
    metadata:
      labels:
        app: moja-aplikacja-canary
        version: v2
    spec:
      containers:
      - name: nginx-container
        image: app:v2
        ports:
        - containerPort: 80






