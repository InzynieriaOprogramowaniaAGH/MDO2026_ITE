apiVersion: apps/v1
kind: Deployment
metadata:
  name: apka-deployment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: apka-lab10
  template:
    metadata:
      labels:
        app: apka-lab10
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
