apiVersion: apps/v1
kind: Deployment
metadata:
  name: apka-deployment
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: 25%
  selector:
    matchLabels:
      app: apka-lab10
  template:
    metadata:
      labels:
        app: apka-lab10
    spec:
      containers:
      - name: nginx
        image: moja-apka:v1
        imagePullPolicy: Never
