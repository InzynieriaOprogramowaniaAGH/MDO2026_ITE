apiVersion: apps/v1
kind: Deployment
metadata:
  name: mdo-deployment-recreate
spec:
  replicas: 4
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: mdo-recreate
  template:
    metadata:
      labels:
        app: mdo-recreate
    spec:
      containers:
      - name: web-container
        image: lemonx26/mdo-app:v1
        ports:
        - containerPort: 80
