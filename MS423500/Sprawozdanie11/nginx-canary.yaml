apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        track: canary
    spec:
      containers:
      - name: nest-container
        image: nest-api:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 3000