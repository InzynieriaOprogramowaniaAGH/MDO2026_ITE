apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: spring-deploy
  name: spring-deploy
spec:
  replicas: 4
  selector:
    matchLabels:
      app: spring-deploy
  strategy: {}
  template:
    metadata:
      labels:
        app: spring-deploy
    spec:
      containers:
      - image: 64pseaqeze/spring-api-prod:final
        name: spring-api-prod
        ports:
        - containerPort: 8080
        resources: {}
status: {}
