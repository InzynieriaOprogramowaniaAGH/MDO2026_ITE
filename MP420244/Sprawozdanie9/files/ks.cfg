#version=RHEL9
text
reboot

url --url=http://download.fedoraproject.org/pub/fedora/linux/releases/44/Everything/x86_64/os/

lang en_US.UTF-8
keyboard us
timezone Europe/Warsaw --utc

network --bootproto=dhcp --device=link --activate
firewall --enabled --ssh

rootpw --plaintext rootpassword
user --name=feduser --password=fedora --plaintext --groups=wheel

# ---------- DISK ----------
ignoredisk --only-use=sda
clearpart --all --initlabel
autopart --type=lvm
bootloader --location=mbr --boot-drive=sda

# ---------- PACKAGES ----------
%packages
@core
curl
tar
moby-engine
containerd
%end

# ---------- SERVICES ----------
services --enabled="sshd,docker"

# ---------- POST INSTALL ----------
%post --log=/root/ks-post.log
set -euxo pipefail

mkdir -p /opt/app

cat > /usr/local/bin/bootstrap-container.sh << 'EOF'
#!/bin/bash
set -euxo pipefail

IMAGE_URL="http://192.168.56.1:8888/ART_my-app-build_latest.tar.gz"
IMAGE_FILE="/tmp/ART_my-app-build_latest.tar.gz"

# wait for network + docker
sleep 10

curl -o "$IMAGE_FILE" "$IMAGE_URL"

systemctl start docker

# load image
docker load -i "$IMAGE_FILE"

# get first image name
IMAGE_NAME=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -n 1)

echo "$IMAGE_NAME" > /opt/app/image_name.txt

# run container
docker rm -f app_container || true

docker run -d \
  --name app_container \
  --restart unless-stopped \
  "$IMAGE_NAME" \
  sh -c "echo '--- /app contents ---'; ls -R /app; exec sleep infinity"
EOF

chmod +x /usr/local/bin/bootstrap-container.sh

cat > /etc/systemd/system/app-bootstrap.service << 'EOF'
[Unit]
Description=App Bootstrap Container Loader
After=docker.service network-online.target
Wants=network-online.target docker.service

[Service]
Type=oneshot
ExecStart=/usr/local/bin/bootstrap-container.sh
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF

systemctl enable app-bootstrap.service
systemctl enable docker

%end