apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: proton
spec:
  replicas: 4
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: proton-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: mysql://root:adminpasS)(*7@mysql-service:3306/protondb

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: proton
spec:
  selector:
    app: backend
  type: ClusterIP
  ports:
      - port: 3000
        targetPort: 3000
