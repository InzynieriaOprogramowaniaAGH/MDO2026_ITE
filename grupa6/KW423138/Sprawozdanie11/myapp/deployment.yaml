apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-canary
  labels:
    app: myapp
    version: canary
    env: prod

spec:
  replicas: 1

  selector:
    matchLabels:
      app: myapp
      version: canary

  template:
    metadata:
      labels:
        app: myapp
        version: canary

    spec:
      containers:
      - name: myapp
        image: megakacper22/myapp:v2
        ports:
        - containerPort: 80
