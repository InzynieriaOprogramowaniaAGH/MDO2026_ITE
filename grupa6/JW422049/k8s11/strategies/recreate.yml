apiVersion: apps/v1
kind: Deployment
metadata:
  name: jw422049-nginx-recreate
spec:
  replicas: 4
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jw422049-nginx-recreate
  template:
    metadata:
      labels:
        app: jw422049-nginx-recreate
    spec:
      containers:
        - name: jw422049-nginx
          image: jw422049-nginx-k8s:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
