apiVersion: apps/v1
kind: Deployment
metadata:
  name: jw422049-nginx-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jw422049-nginx-canary
      track: stable
  template:
    metadata:
      labels:
        app: jw422049-nginx-canary
        track: stable
    spec:
      containers:
        - name: jw422049-nginx
          image: jw422049-nginx-k8s:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 80
