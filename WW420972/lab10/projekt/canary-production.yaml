apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplikacja-canary-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: canary-app
  template:
    metadata:
      labels:
        app: canary-app
        track: production
    spec:
      containers:
      - name: nginx-kontener
        image: moja-aplikacja:v1
        ports:
        - containerPort: 80
