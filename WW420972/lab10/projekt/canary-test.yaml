apiVersion: apps/v1
kind: Deployment
metadata:
  name: aplikacja-canary-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canary-app
  template:
    metadata:
      labels:
        app: canary-app
        track: canary
    spec:
      containers:
      - name: nginx-kontener
        image: moja-aplikacja:v2
        ports:
        - containerPort: 80
