- name: Deploy Docker + hello image
  hosts: managed
  become: true
  become_method: su
  tasks:
   - name: Install Ansible dependencies
     community.general.pacman:
       update_cache: true
       name: python-requests
   - name: Install Docker
     community.general.pacman:
       update_cache: true
       name: docker
   - name: Start Docker service
     ansible.builtin.systemd_service:
       name: docker.service
       state: started
   - name: Pull hello image
     community.docker.docker_image_pull:
       name: hello-world
       tag: latest
   - name: Run image
     community.docker.docker_container:
       cleanup: true
       detach: false
       image: hello-world
       name: hello
