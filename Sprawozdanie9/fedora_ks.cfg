# Generated by Anaconda 44.30

# Keyboard layouts
keyboard --vckeymap=pl --xlayouts='pl'
# System language
lang pl_PL.UTF-8

network --bootproto=dhcp --device=link --activate
network --hostname=fedora-unattended

%packages
@^server-product-environment
moby-engine
git
%end

# System authorization information
authselect enable-feature with-fingerprint

# Run the Setup Agent on first boot
firstboot --enable

ignoredisk --only-use=sda
autopart
clearpart --all --initlabel

# System timezone
timezone Europe/Warsaw --utc

# Root password (zachowujemy Twoje zaszyfrowane hasło)
rootpw --iscrypted --allow-ssh $y$j9T$nnZGLQq3JuGTnoxPDMABkY5c$8Xxr8c3LTfDhkxxjnL8JgepAHM6cX0z.vp7b0/GF/GD

reboot

%post --interpreter=/bin/bash --log=/root/ks-post.log
exec < /dev/console > /dev/console
echo "ROZPOCZYNAM KONFIGURACJĘ POST-INSTALL..."

cat <<EOF > /etc/systemd/system/first-boot-deploy.service
[Unit]
Description=Automatyczne wdrozenie aplikacji API
After=docker.service
Requires=docker.service

[Service]
Type=oneshot
ExecStartPre=/usr/bin/docker pull 64pseaqeze/spring-api-prod:final
ExecStart=/usr/bin/docker run -d -p 8081:8080 --name api-server 64pseaqeze/spring-api-prod:final
RemainAfterExit=yes

[Install]
WantedBy=multi-user.target
EOF
o
systemctl enable first-boot-deploy.service

echo "------------------------------------------------------" > /dev/tty1
echo "KONFIGURACJA POST-INSTALL ZAKONCZONA. SYSTEM GOTOWY." > /dev/tty1
echo "------------------------------------------------------" > /dev/tty1
%end