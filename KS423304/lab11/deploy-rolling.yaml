apiVersion: apps/v1
kind: Deployment
metadata:
  name: strat-rolling
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 2
      maxSurge: "25%"
  selector:
    matchLabels:
      app: apka-rolling
  template:
    metadata:
      labels:
        app: apka-rolling
    spec:
      containers:
      - name: apka
        image: kinsu-apka:v1
        imagePullPolicy: Never
