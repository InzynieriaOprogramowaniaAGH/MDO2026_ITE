---
apiVersion: v1
kind: Service
metadata:
  name: canary-service
spec:
  type: NodePort
  selector:
    app: apka-canary 
  ports:
  - port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apka-canary
      track: stable
  template:
    metadata:
      labels:
        app: apka-canary
        track: stable
    spec:
      containers:
      - name: apka
        image: kinsu-apka:v1
        imagePullPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-new
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apka-canary
      track: canary
  template:
    metadata:
      labels:
        app: apka-canary
        track: canary
    spec:
      containers:
      - name: apka
        image: kinsu-apka:v2
        imagePullPolicy: Never
