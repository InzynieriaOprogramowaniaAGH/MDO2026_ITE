---
- name: Zainstaluj wymagane pakiety
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
      - python3-requests
      - python3-docker
    state: present
    update_cache: yes

- name: Stworz katalog na klucze
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Pobierz klucz GPG Dockera
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Dodaj repozytorium Dockera
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Zainstaluj Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Upewnij sie, ze Docker dziala
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

- name: Wyciagnij artefakt z kontenera DIND na Maszyne Glowna
  delegate_to: localhost
  become: false
  ansible.builtin.shell: "docker exec jenkins-docker docker save nestjs-app-ds419547:8 > /tmp/nestjs-app.tar"

- name: Przeslij artefakt na Maszyne Ansible
  ansible.builtin.copy:
    src: /tmp/nestjs-app.tar
    dest: /tmp/nestjs-app.tar
    mode: '0644'

- name: Zaladuj obraz Docker na Maszynie Ansible
  ansible.builtin.shell: "docker load < /tmp/nestjs-app.tar"

- name: Usun stary kontener (jesli istnieje)
  ansible.builtin.shell: "docker rm -f moja-aplikacja-mdo || true"

- name: Uruchom kontener aplikacji 
  ansible.builtin.shell: |
    docker run -d \
      --name moja-aplikacja-mdo \
      --restart always \
      -p 3000:3000 \
      nestjs-app-ds419547:8
