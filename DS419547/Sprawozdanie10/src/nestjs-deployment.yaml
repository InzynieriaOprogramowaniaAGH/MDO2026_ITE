apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-app-deployment
  labels:
    app: nestjs-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nestjs-app
  template:
    metadata:
      labels:
        app: nestjs-app
    spec:
      containers:
      - name: nestjs-container
        image: razeee/nestjs-app-ds419547:latest
        ports:
        - containerPort: 3000
